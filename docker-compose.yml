services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --sql-mode=""
    environment:
      MYSQL_DATABASE: pmc-exam
      MYSQL_USER: pmc-exam
      MYSQL_PASSWORD: pmc-exam
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - public_data:/var/www/html/public
      - ./public/uploads:/var/www/html/public/uploads
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - public_data:/var/www/html/public:ro
      - ./public/uploads:/var/www/html/public/uploads:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
    command: ["php", "artisan", "queue:work", "database", "--sleep=1", "--tries=1", "--timeout=0"]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
    command: ["php", "artisan", "schedule:work"]

volumes:
  db_data:
  public_data:
  storage_data:
  cache_data:
