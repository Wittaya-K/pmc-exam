version: '3.8'

services:
  app:
    build: .
    container_name: csserv-app
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: csserv-web
    # ports:
    #   - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: csserv-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: uQPFVu(Oyfa3a[H5
      MYSQL_DATABASE: srsdb
      MYSQL_USER: srsdb
      MYSQL_PASSWORD: uQPFVu(Oyfa3a[H5
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
