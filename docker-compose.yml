services:
  app:
    build: .
    container_name: pmc-exam-app
    restart: always
    volumes:
      - storage_data:/var/www/html/storage
      - public_uploads:/var/www/html/public/uploads
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: pmc-exam-web
    restart: always
    ports:
      - "127.0.0.1:8083:80"
    volumes:
      - storage_data:/var/www/html/storage
      - public_uploads:/var/www/html/public/uploads
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: pmc-exam-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  storage_data:
  public_uploads:
