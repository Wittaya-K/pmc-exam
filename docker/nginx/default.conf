server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Docker Embedded DNS — ให้ nginx resolve ชื่อ service ใหม่ทุกครั้งที่ container ถูก recreate
    # (ถ้าไม่มีบรรทัดนี้ nginx มักจะ cache IP ของ app:9000 ไว้ → 502 หลัง docker compose up --force-recreate)
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 200M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}

